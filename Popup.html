<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>BVM - Welcome</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    #popupOverlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.9);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 9999;
    }
    #popupBox {
      background: #111;
      border: 1px solid #333;
      padding: 40px 30px;
      max-width: 380px;
      width: 90%;
      text-align: center;
      border-radius: 16px;
      box-shadow: 0 10px 40px rgba(0,0,0,0.7);
    }
    h1 {
      margin: 0 0 24px;
      font-size: 2.4em;
    }
    h3 {
      margin: 12px 0;
      font-weight: normal;
      font-size: 1.15em;
    }
    .highlight {
      color: #ff9800;
      font-weight: bold;
    }
    button {
      margin: 20px 12px 8px;
      padding: 14px 36px;
      font-size: 1.1em;
      border: none;
      border-radius: 10px;
      cursor: pointer;
      transition: all 0.25s;
    }
    #pcBtn {
      background: #4caf50;
      color: white;
    }
    #phoneBtn {
      background: #2196f3;
      color: white;
    }
    button:hover {
      opacity: 0.92;
      transform: scale(1.06);
    }
  </style>
</head>
<body>

<!-- Popup -->
<div id="popupOverlay">
  <div id="popupBox">
    <h1>Welcome to BVM</h1>
    <h3>Scroll to see photos.</h3>
    <h3>Logos / photos are clickable buttons.</h3>
    <h3 class="highlight">This website is optimised for PC.</h3>
    <h3>Choose your device:</h3>
    
    <button id="phoneBtn" onclick="goTo('phone')">Phone</button>
    <button id="pcBtn" onclick="goTo('pc')">PC</button>
  </div>
</div>

<script>
  function goTo(device) {
    document.getElementById("popupOverlay").style.display = "none";
    
    if (device === 'pc') {
      window.location.href = "https://brebendc.github.io/BVM/BVM.html";
    } else if (device === 'phone') {
      window.location.href = "https://brebendc.github.io/BVM-GSM/BVM.html";
    }
  }
</script>

</body>
</html>
